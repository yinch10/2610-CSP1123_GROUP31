{% extends "layout.html" %}

{% block content %}
<div class="container py-4">
    <h2 class="fw-bold">Lecturer Dashboard</h2>
    <p class="text-muted">Welcome back! What would you like to do today?</p>

    <div class="row mt-4">
        <div class="col-md-6 mb-3">
            <div class="card h-100 shadow-sm border-primary">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">New Analysis</h5>
                    <p class="card-text">Input exam questions to check Bloom's Taxonomy levels.</p>
                    <a href="/input" class="btn btn-primary">Start Analyzing</a>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">History</h5>
                    <p class="card-text">View your previously analyzed questions and reports.</p>
                    <a href="#" class="btn btn-outline-secondary">View Records</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
